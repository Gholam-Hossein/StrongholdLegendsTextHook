name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Clone MinHook into correct directory ---
      - name: Clone MinHook
        run: |
          if (!(Test-Path "third_party")) { mkdir third_party }
          if (!(Test-Path "third_party/minhook")) { git clone https://github.com/TsudaKageyu/minhook.git third_party/minhook }

      # --- Setup MSVC (Win32 toolchain) ---
      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      # --- Configure CMake ---
      - name: Configure CMake
        run: cmake -S . -B build -A Win32

      # --- Build DLL ---
      - name: Build DLL
        run: cmake --build build --config Release

      # --- Package into ZIP ---
      - name: Create ZIP package
        run: |
          if (!(Test-Path "output")) { mkdir output }
          copy build/Release/*.dll output/
          powershell Compress-Archive -Path output/* -DestinationPath PersianTextHook.zip

      # --- Create GitHub Release ---
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: PersianTextHook.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
