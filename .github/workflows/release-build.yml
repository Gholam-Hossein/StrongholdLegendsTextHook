name: Release Build (DLL)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Clone MinHook
        shell: bash
        run: |
          set -e
          git clone --depth=1 https://github.com/TsudaKageyu/minhook external/minhook
          rm -rf external/minhook/.git

      - name: Configure
        run: cmake -S . -B build -A Win32

      - name: Build
        run: cmake --build build --config Release

      - name: Package DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -Force "build/Release/*.dll" "release/"
          Compress-Archive -Force -Path "release/*" -DestinationPath "PersianTextHook-Win32.zip"

      - name: Prepare tag
        id: vars
        shell: pwsh
        run: |
          $t = "v0.1.${{ github.run_number }}"
          "tag=$t" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=PersianTextHook $t" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.name }}
          prerelease: false
          draft: false
          files: |
            PersianTextHook-Win32.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
