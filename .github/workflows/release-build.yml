name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Clone MinHook into correct directory ---
      - name: Clone MinHook
        run: |
          mkdir third_party
          git clone https://github.com/TsudaKageyu/minhook.git third_party/minhook

      # --- Setup MSVC compiler toolchain ---
      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      # --- Configure CMake for Win32 ---
      - name: Configure CMake
        run: cmake -S . -B build -A Win32

      # --- Build DLL ---
      - name: Build DLL
        run: cmake --build build --config Release

      # --- Package output into zip ---
      - name: Create ZIP package
        run: |
          mkdir output
          copy build/Release/*.dll output/
          powershell Compress-Archive -Path output/* -DestinationPath PersianTextHook.zip

      # --- Publish Release & Upload asset ---
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: PersianTextHook.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
