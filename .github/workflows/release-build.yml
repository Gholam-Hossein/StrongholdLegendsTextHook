name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare third_party and clone MinHook
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "third_party" | Out-Null
          if (Test-Path "third_party/minhook") {
            Remove-Item -Recurse -Force "third_party/minhook"
          }

          git clone --depth=1 https://github.com/TsudaKageyu/minhook.git third_party/minhook

          if (!(Test-Path "third_party/minhook/CMakeLists.txt")) {
            Write-Host "Contents of third_party:"
            Get-ChildItem -Recurse third_party | Format-List
            throw "MinHook clone failed or path is wrong"
          }

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -S . -B build -A Win32

      - name: Build DLL
        run: cmake --build build --config Release

      - name: Prepare ZIP folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "output" | Out-Null
          Copy-Item "build/Release/*.dll" "output/" -Force

      - name: Create ZIP package
        shell: powershell
        run: |
          Compress-Archive -Path "output/*" -DestinationPath "PersianTextHook.zip" -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: PersianTextHook.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
